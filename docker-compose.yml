version: '3.8'

services:
  db:
    image: postgres:15
    container_name: riah_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-riah}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-riahpass}
      POSTGRES_DB: ${DB_NAME:-riah}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - riah-network

  redis:
    image: redis:7-alpine
    container_name: riah_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - riah-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riah_backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://${DB_USER:-riah}:${DB_PASSWORD:-riahpass}@db:5432/${DB_NAME:-riah}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    networks:
      - riah-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: riah_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATABASE_URL: postgresql://${DB_USER:-riah}:${DB_PASSWORD:-riahpass}@db:5432/${DB_NAME:-riah}
    ports:
      - "3000:3000"
    networks:
      - riah-network

volumes:
  postgres_data:

networks:
  riah-network:
    driver: bridge
